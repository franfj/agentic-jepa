# Backbone: Llama 3.2-1B
# Requires ~4GB VRAM (fp16) or ~2GB (4-bit quantized)
# NOTE: Requires HuggingFace access token for gated model

model:
  backbone: "meta-llama/Llama-3.2-1B"
  latent_dim: 2048
  action_dim: 2048
  predictor_hidden: 768
  predictor_heads: 8
  predictor_layers: 2
  max_length: 128
  quantize: false

ema:
  momentum: 0.996
  momentum_end: 1.0
  warmup_steps: 2000

training:
  batch_size: 8
  learning_rate: 2.0e-5
  weight_decay: 0.05
  warmup_steps: 200
  max_steps: 2000
  log_every: 100
  checkpoint_every: 500
  output_dir: "outputs/llama"

planning:
  top_k: 3

wandb:
  enabled: false
  project: "agentic-jepa"
  entity: null

seed: 42

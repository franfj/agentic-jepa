model:
  backbone: "meta-llama/Llama-3.2-1B"
  latent_dim: 2048
  action_dim: 2048
  predictor_hidden: 1024
  predictor_heads: 8
  predictor_layers: 2
  max_length: 128
  quantize: true

ema:
  momentum: 0.996
  momentum_end: 1.0
  warmup_steps: 500

training:
  batch_size: 8
  learning_rate: 2.0e-5
  weight_decay: 0.05
  warmup_steps: 200
  max_steps: 500
  log_every: 50
  checkpoint_every: 500
  output_dir: "outputs/llama"

planning:
  top_k: 3

wandb:
  enabled: false
  project: "agentic-jepa"
  entity: null

seed: 42

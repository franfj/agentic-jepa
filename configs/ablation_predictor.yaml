# Ablation: predictor architecture
# Run multiple times changing predictor_layers and predictor_hidden.
# Layer variants: 1, 2 (default), 4, 6
# Width variants: 256, 512 (default), 1024

model:
  backbone: "gpt2"
  latent_dim: 768
  action_dim: 768
  predictor_hidden: 512  # Change per variant: 256, 512, 1024
  predictor_heads: 8
  predictor_layers: 1  # Change per variant: 1, 2, 4, 6
  max_length: 128

ema:
  momentum: 0.996
  momentum_end: 1.0
  warmup_steps: 2000

training:
  batch_size: 16
  learning_rate: 5.0e-5
  weight_decay: 0.05
  warmup_steps: 200
  max_steps: 2000
  log_every: 100
  checkpoint_every: 500
  output_dir: "outputs/ablation_predictor"

planning:
  top_k: 3

wandb:
  enabled: false
  project: "agentic-jepa"
  entity: null

seed: 42

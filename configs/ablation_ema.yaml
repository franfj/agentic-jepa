# Ablation: EMA momentum
# Run multiple times changing ema.momentum for each variant.
# Variants: 0.0 (no EMA), 0.9, 0.99, 0.996 (default), 0.999

model:
  backbone: "gpt2"
  latent_dim: 768
  action_dim: 768
  predictor_hidden: 512
  predictor_heads: 8
  predictor_layers: 2
  max_length: 128

ema:
  momentum: 0.99  # Change per variant: 0.0, 0.9, 0.99, 0.996, 0.999
  momentum_end: 1.0
  warmup_steps: 2000

training:
  batch_size: 16
  learning_rate: 5.0e-5
  weight_decay: 0.05
  warmup_steps: 200
  max_steps: 2000
  log_every: 100
  checkpoint_every: 500
  output_dir: "outputs/ablation_ema"

planning:
  top_k: 3

wandb:
  enabled: false
  project: "agentic-jepa"
  entity: null

seed: 42

model:
  backbone: "gpt2"
  latent_dim: 768
  action_dim: 768
  predictor_hidden: 512
  predictor_heads: 8
  predictor_layers: 2
  max_length: 128

ema:
  momentum: 0.996
  momentum_end: 1.0
  warmup_steps: 500

training:
  batch_size: 16
  learning_rate: 5.0e-5
  weight_decay: 0.05
  warmup_steps: 200
  max_steps: 500
  log_every: 50
  checkpoint_every: 1000
  output_dir: "outputs/default"

planning:
  top_k: 3

toy_env:
  goal: "The document has been summarized and filed in the archive folder."
  initial_state: "You have an open document on the screen. It contains a 3-page report about Q4 sales."
  actions:
    - "Read the document carefully"
    - "Summarize the document in 3 bullet points"
    - "File the document in the archive folder"
    - "Delete the document"
    - "Send the document to the printer"
    - "Open a new blank document"
    - "Search for related documents"
    - "Close the application"

wandb:
  enabled: false
  project: "agentic-jepa"
  entity: null

seed: 42
